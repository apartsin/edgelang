<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeLang</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 16px;
      background: #f5f5f5;
      color: #333;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: white;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    
    .status-active { background: #4CAF50; }
    .status-off { background: #888; }
    .status-warning { background: #FFA500; }
    .status-processing {
      background: #2BCB7A;
      box-shadow: 0 0 0 rgba(43, 203, 122, 0.45);
      animation: pulseDot 0.9s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(43, 203, 122, 0.45); }
      70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(43, 203, 122, 0); }
      100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(43, 203, 122, 0); }
    }
    
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: white;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .toggle-label {
      font-size: 14px;
    }
    
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    .toggle input:checked + .toggle-slider {
      background-color: #667eea;
    }
    
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    
    .mode-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    
    .mode-btn.active {
      border-color: #667eea;
      background: #f0f0ff;
      color: #667eea;
    }
    
    .stats {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .stats-title {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #667eea;
    }
    
    .stat-label {
      font-size: 11px;
      color: #888;
    }
    
    .quick-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .action-btn {
      padding: 10px;
      border: none;
      background: #667eea;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    
    .action-btn:hover {
      background: #5a6fd6;
    }
    
    .action-btn.secondary {
      background: white;
      color: #667eea;
      border: 1px solid #667eea;
    }
    
    .site-info {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
    }
    
    .link-btn {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"></div>
    <div class="title">EdgeLang</div>
  </div>
  
  <div class="status">
    <div class="status-indicator" id="statusIndicator"></div>
    <span id="statusText">Loading...</span>
  </div>

  <div class="status" style="margin-top: -4px;">
    <span style="font-size: 12px; color: #666;" id="pageMeta">Detecting page context...</span>
  </div>
  
  <div class="toggle-row">
    <span class="toggle-label">Extension Enabled</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
  
  <div class="mode-selector">
    <button class="mode-btn" id="autoBtn">Auto</button>
    <button class="mode-btn active" id="passiveBtn">Passive</button>
    <button class="mode-btn" id="activeBtn">Active</button>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Pause Learning</span>
    <label class="toggle">
      <input type="checkbox" id="pauseToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
  
  <div class="stats">
    <div class="stats-title">Your Progress</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="streakValue">0</div>
        <div class="stat-label">Day Streak</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="accuracyValue">0%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="resolvedValue">0</div>
        <div class="stat-label">Words Learned</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="levelValue">-</div>
        <div class="stat-label">Level</div>
      </div>
    </div>
  </div>
  
  <div class="quick-actions">
    <button class="action-btn secondary" id="toggleSite">Loading site rule...</button>
    <button class="action-btn" id="runCalibration">Run Calibration</button>
    <button class="action-btn secondary" id="viewStats">View Statistics</button>
    <button class="action-btn secondary" id="openOptions">Settings</button>
  </div>
  
  <div class="site-info" id="siteInfo"></div>
  
  <script src="popup.js"></script>
</body>
</html>
